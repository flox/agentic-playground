            "on-activate": "# Publish the service's bind address (OMLX_HOST / OMLX_PORT) and admin key\n# (OMLX_API_KEY) so consumers and interactive shells can reach it.\n# Override any value at runtime by writing to:\n#   $FLOX_ENV_CACHE/omlx.host       e.g. \"0.0.0.0\"\n#   $FLOX_ENV_CACHE/omlx.port       e.g. \"9001\"\n#   $FLOX_ENV_CACHE/omlx.api-key    enables admin endpoints when set\nexport OMLX_HOST=\"$(cat \"$FLOX_ENV_CACHE/omlx.host\" 2>/dev/null || echo 127.0.0.1)\"\nexport OMLX_PORT=\"$(cat \"$FLOX_ENV_CACHE/omlx.port\" 2>/dev/null || echo 8000)\"\nexport OMLX_API_KEY=\"$(cat \"$FLOX_ENV_CACHE/omlx.api-key\" 2>/dev/null || true)\"\n"
          },
