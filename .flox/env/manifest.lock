    "hook": {
      "on-activate": "# Publish the service's bind address (OMLX_HOST / OMLX_PORT) and admin key\n# (OMLX_API_KEY) so consumers and interactive shells can reach it.\n# Override any value at runtime by writing to:\n#   $FLOX_ENV_CACHE/omlx.host       e.g. \"0.0.0.0\"\n#   $FLOX_ENV_CACHE/omlx.port       e.g. \"9001\"\n#   $FLOX_ENV_CACHE/omlx.api-key    enables admin endpoints when set\nexport OMLX_HOST=\"$(cat \"$FLOX_ENV_CACHE/omlx.host\" 2>/dev/null || echo 127.0.0.1)\"\nexport OMLX_PORT=\"$(cat \"$FLOX_ENV_CACHE/omlx.port\" 2>/dev/null || echo 8000)\"\nexport OMLX_API_KEY=\"$(cat \"$FLOX_ENV_CACHE/omlx.api-key\" 2>/dev/null || true)\"\n\n  export OLLAMA_HOST=\"${OLLAMA_HOST:-127.0.0.1}\"\n  export OLLAMA_PORT=\"${OLLAMA_PORT:-11434}\"\n  export OPENAI_API_BASE=\"${OPENAI_API_BASE:-http://127.0.0.1:11434/v1}\"\n  export OPENAI_API_KEY=\"${OPENAI_API_KEY:-ollama}\"\n  export OMLX_HOST=\"${OMLX_HOST:-127.0.0.1}\"\n  export OMLX_PORT=\"${OMLX_PORT:-8000}\"\n  export LLAMACPP_PROXY_OLLAMA_LISTEN=\"${LLAMACPP_PROXY_OLLAMA_LISTEN:-127.0.0.1:8081}\"\n  export LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN=\"${LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN:-127.0.0.1:8082}\"\n  export LLAMACPP_PROXY_OMLX_LISTEN=\"${LLAMACPP_PROXY_OMLX_LISTEN:-127.0.0.1:8083}\"\n  export LLAMACPP_PROXY_GEMINI_OMLX_LISTEN=\"${LLAMACPP_PROXY_GEMINI_OMLX_LISTEN:-127.0.0.1:8084}\"\n"
    },
    "profile": {
      "common": "  export PATH=\"$FLOX_ENV_PROJECT/bin:$PATH\"\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin"
      ]
    },
    "services": {
      "llamacpp-proxy-ollama": {
        "command": "  if [[ \"$(uname -s)\" == \"Darwin\" && \"$(uname -m)\" != \"arm64\" ]]; then\n    echo \"llamacpp-proxy not supported on Intel Mac\" >&2; exit 1\n  fi\n  _ollama=\"${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}\"\n  if ! curl -sf --connect-timeout 3 --max-time 5 \"http://${_ollama}/\" >/dev/null 2>&1; then\n    echo \"ollama is not reachable at ${_ollama} — start ollama before this service\" >&2; exit 1\n  fi\n  model=\"$(cat \"${FLOX_ENV_CACHE}/llamacpp-proxy-ollama.model\" 2>/dev/null || true)\"\n  [[ -z \"$model\" ]] && model=\"default\"\n  exec llamacpp-proxy \\\n    --listen \"${LLAMACPP_PROXY_OLLAMA_LISTEN:-127.0.0.1:8081}\" \\\n    --backend \"${OLLAMA_HOST:-127.0.0.1}:${OLLAMA_PORT:-11434}\" \\\n    --backend-model \"$model\" \\\n    --gemini-listen \"${LLAMACPP_PROXY_GEMINI_OLLAMA_LISTEN:-127.0.0.1:8082}\"\n"
      },
      "llamacpp-proxy-omlx": {
        "command": "  if [[ \"$(uname -s)\" == \"Darwin\" && \"$(uname -m)\" != \"arm64\" ]]; then\n    echo \"llamacpp-proxy not supported on Intel Mac\" >&2; exit 1\n  fi\n  # Read key from omlx's own settings file (authoritative source)\n  _api_key=\"$(jq -r '.auth.api_key // empty' \"$HOME/.omlx/settings.json\" 2>/dev/null || true)\"\n  if [[ -z \"$_api_key\" ]]; then\n    echo \"Error: omlx API key not found in ~/.omlx/settings.json — is omlx running?\" >&2; exit 1\n  fi\n  model=\"$(cat \"${FLOX_ENV_CACHE}/llamacpp-proxy-omlx.model\" 2>/dev/null || true)\"\n  [[ -z \"$model\" ]] && model=\"default\"\n  exec llamacpp-proxy \\\n    --listen \"${LLAMACPP_PROXY_OMLX_LISTEN:-127.0.0.1:8083}\" \\\n    --backend \"${OMLX_HOST:-127.0.0.1}:${OMLX_PORT:-8000}\" \\\n    --backend-api-key \"$_api_key\" \\\n    --backend-model \"$model\" \\\n    --gemini-listen \"${LLAMACPP_PROXY_GEMINI_OMLX_LISTEN:-127.0.0.1:8084}\"\n"
      },
      "omlx": {
        "command": "host=\"$(cat \"$FLOX_ENV_CACHE/omlx.host\" 2>/dev/null || echo 127.0.0.1)\"\nport=\"$(cat \"$FLOX_ENV_CACHE/omlx.port\" 2>/dev/null || echo 8000)\"\nkey=\"$(cat \"$FLOX_ENV_CACHE/omlx.api-key\" 2>/dev/null || true)\"\nif [ -n \"$key\" ]; then\n  exec omlx serve --host \"$host\" --port \"$port\" --api-key \"$key\"\nelse\n  exec omlx serve --host \"$host\" --port \"$port\"\nfi\n"
      }
    }
  },
